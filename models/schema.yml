version: 2

models:
  - name: stg_thechos_mxd
    description: Stage de hechos MexDer.
    columns:
      - name: id_hecho
        tests:
          - not_null

  - name: stg_tsplits
    description: Stage de splits.
    columns:
      - name: id_split
        tests:
          - not_null
          - unique

  - name: stg_mxd_emisoras
    description: Catalogo stage de emisoras MexDer.

  - name: stg_cat_tipo_concertacion
    description: Catalogo DWH para traducir concertacion.

  - name: stg_casas_bolsa
    description: Catalogo DWH de casas de bolsa para claves comprador/vendedor.

  - name: stg_md_cat_liquidadores
    description: Catalogo historico de liquidadores usado en enriquecimiento.

  - name: stg_ope_tcuentas_liquidaciones
    description: Fuente operativa del catalogo de liquidadores.

  - name: int_md_hechos_diario_base
    description: Transformacion base equivalente al insert principal de MD_HECHOS_DIARIO.
    columns:
      - name: id_folio
        tests:
          - not_null

  - name: int_md_hechos_diario_enriquecido
    description: Equivalente logico de updates sobre MD_HECHOS_DIARIO (emisora/concertacion/claves/socios).

  - name: int_md_cat_liquidadores_fuente
    description: Fuente transformada de OPE_TCUENTAS_LIQUIDACIONES para poblar MD_CAT_LIQUIDADORES.

  - name: fct_md_hechos_hist
    description: Registros historicos incluidos por regla de negocio.

  - name: fct_md_hechos_excluidos_hist
    description: Registros historicos excluidos por tipo_instrumento/difundir_terminal_espera.

  - name: fct_md_hechos_cancelados_hist
    description: Registros cancelados por estado_monet.
